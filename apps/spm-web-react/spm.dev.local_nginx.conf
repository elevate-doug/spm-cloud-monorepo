# Map the Upgrade header to determine the Connection header value
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
	listen 80;
	server_name		spm.dev.local;
    return 301 https://$host$request_uri; # Redirect HTTP to HTTPS
}

server {
    listen 443 ssl;
	server_name		spm.dev.local;

	ssl_certificate     /etc/nginx/ssl/spm.dev.local.crt;
    ssl_certificate_key /etc/nginx/ssl/spm.dev.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

	root	/usr/share/nginx/html;
	index	index.html;

	location /api/ {
		proxy_pass			http://apiservice:8080;
		proxy_set_header	Host $host;
		proxy_set_header	X-Real-IP $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /ws/ {
		proxy_pass			http://apiservice:8080;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		# SignalR Specifics
		proxy_cache off;                # Do not cache real-time streams
		proxy_buffering off;            # Required for Server-Sent Events (SignalR fallback)
		proxy_read_timeout 100s;        # Prevents early timeouts on long-lived connections
    
		# Standard Forwarding Headers
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;	
    }

	location / {
		try_files $uri $uri/ /index.html =404;
	}
}